networks:
  app-network:
    driver: bridge

services:
  # 1. Nginx Gateway
  nginx:
    build:
      context: .
      dockerfile: infrastructure/nginx/Dockerfile
    container_name: nginx-gateway
    ports:
      - "80:80"
    env_file: ./.env
    networks:
      - app-network
    depends_on:
      web-app:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped

  # 2. Database
  db-main:
    image: postgres:18.3-alpine
    container_name: db-main-simshop
    env_file: ./.env
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Web-app (Next.js)
  web-app:
    build:
      context: .
      dockerfile: apps/web-app/Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    container_name: web-app
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - ./.env
      - ./apps/web-app/.env
    networks:
      - app-network
    user: root
    environment:
      - HOSTNAME=0.0.0.0
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db-main:
        condition: service_healthy
    restart: always

  # 4. API (Laravel)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: api
    expose:
      - "9000"
    env_file:
      - ./.env
      - ./apps/api/.env
    environment:
      - DB_HOST=db-main
    ports:
      - "8000:10000"
    networks:
      - app-network
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=10000"]
    volumes:
      - ./apps/api:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:10000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s
    depends_on:
      db-main:
        condition: service_healthy
    restart: always

volumes:
  pgdata:

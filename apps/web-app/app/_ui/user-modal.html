<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SIM Admin - Add User</title>
    <!-- Google Fonts: Manrope & Inter -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Manrope:wght@700;800&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Lucide Icons (via CDN for visual consistency with request) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#dae2fd",
              primary: "#003f87",
              outline: "#727784",
              "on-surface": "#131b2e",
              "surface-container-lowest": "#ffffff",
              "inverse-on-surface": "#eef0ff",
              "primary-container": "#0056b3",
              "secondary-container": "#d93343",
              "on-tertiary-fixed-variant": "#3a485b",
              "on-secondary": "#ffffff",
              "on-secondary-fixed": "#410008",
              "surface-container-low": "#f2f3ff",
              "on-tertiary": "#ffffff",
              "on-background": "#131b2e",
              "on-secondary-fixed-variant": "#92001f",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#b9c7df",
              "surface-tint": "#115cb9",
              "surface-dim": "#d2d9f4",
              "on-tertiary-fixed": "#0d1c2e",
              secondary: "#b6152e",
              tertiary: "#354356",
              "surface-variant": "#dae2fd",
              "on-error": "#ffffff",
              "tertiary-fixed": "#d5e3fc",
              "surface-container-high": "#e2e7ff",
              "on-surface-variant": "#424752",
              "surface-container": "#eaedff",
              "tertiary-container": "#4c5a6e",
              "on-primary-fixed-variant": "#004491",
              "on-primary-fixed": "#001a40",
              surface: "#faf8ff",
              background: "#faf8ff",
              "on-primary-container": "#bbd0ff",
              "primary-fixed": "#d7e2ff",
              "inverse-surface": "#283044",
              error: "#ba1a1a",
              "surface-bright": "#faf8ff",
              "on-tertiary-container": "#c3d1e9",
              "error-container": "#ffdad6",
              "inverse-primary": "#acc7ff",
              "on-primary": "#ffffff",
              "primary-fixed-dim": "#acc7ff",
              "outline-variant": "#c2c6d4",
              "secondary-fixed": "#ffdad9",
              "secondary-fixed-dim": "#ffb3b2",
              "on-secondary-container": "#fffbff",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3 {
        font-family: "Manrope", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface antialiased">
    <!-- background content (Blurred User List) -->
    <div
      class="fixed inset-0 z-0 flex overflow-hidden filter blur-[2px] pointer-events-none"
    >
      <aside
        class="fixed left-0 top-0 h-full flex flex-col px-6 py-8 bg-slate-50 dark:bg-slate-950 w-64 z-10"
      >
        <div class="mb-10">
          <span class="text-lg font-bold text-blue-800 dark:text-blue-300"
            >SIM Curator</span
          >
          <p class="text-xs text-slate-500">Management Portal</p>
        </div>
        <nav class="space-y-4">
          <div
            class="flex items-center gap-3 text-blue-700 font-semibold relative px-4 py-2 rounded-lg bg-blue-50/50"
          >
            <i class="w-5 h-5" data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </div>
          <div class="flex items-center gap-3 text-slate-500 px-4 py-2">
            <i class="w-5 h-5" data-lucide="cpu"></i>
            <span>Inventory</span>
          </div>
          <div class="flex items-center gap-3 text-slate-500 px-4 py-2">
            <i class="w-5 h-5" data-lucide="users"></i>
            <span>User Management</span>
          </div>
        </nav>
      </aside>
      <main class="ml-64 flex-1 p-10 bg-surface">
        <header class="flex justify-between items-end mb-12">
          <div>
            <h1
              class="text-4xl font-extrabold tracking-tight text-on-surface mb-2"
            >
              User Management
            </h1>
            <p class="text-on-surface-variant">
              Manage team access and store permissions
            </p>
          </div>
          <button
            class="bg-linear-to-br from-primary to-primary-container text-on-primary px-6 py-3 rounded-xl shadow-lg shadow-primary/20 font-bold flex items-center gap-2"
          >
            <i class="w-5 h-5" data-lucide="plus"></i>
            Add New User
          </button>
        </header>
        <div class="bg-surface-container-low rounded-2xl overflow-hidden">
          <div
            class="grid grid-cols-12 px-6 py-4 bg-surface-container-high text-[0.6875rem] font-bold uppercase tracking-wider text-on-surface-variant"
          >
            <div class="col-span-4">Full Name</div>
            <div class="col-span-3">Role</div>
            <div class="col-span-3">Status</div>
            <div class="col-span-2 text-right">Actions</div>
          </div>
          <div class="divide-y divide-outline-variant/10">
            <div
              class="grid grid-cols-12 px-6 py-6 items-center hover:bg-surface-container-highest transition-colors duration-300"
            >
              <div class="col-span-4 flex items-center gap-4">
                <div
                  class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold"
                >
                  JD
                </div>
                <div>
                  <div class="font-semibold text-on-surface">Jane Doe</div>
                  <div class="text-sm text-on-surface-variant">
                    jane@simcurator.com
                  </div>
                </div>
              </div>
              <div class="col-span-3 text-on-surface-variant">
                Store Manager
              </div>
              <div class="col-span-3">
                <span
                  class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase"
                  >Active</span
                >
              </div>
              <div class="col-span-2 text-right">
                <i class="w-5 h-5 text-outline" data-lucide="more-vertical"></i>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- Modal Overlay -->
    <div
      class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-on-surface/60 backdrop-blur-sm"
    >
      <!-- components/AddUserModal.tsx -->
      <div
        class="bg-surface-container-lowest w-full max-w-2xl rounded-[1.5rem] shadow-2xl shadow-on-surface/40 relative flex flex-col overflow-hidden max-h-[90vh]"
      >
        <!-- Modal Header -->
        <div class="px-8 pt-8 pb-4 flex justify-between items-start shrink-0">
          <div>
            <h2 class="text-2xl font-extrabold text-on-surface tracking-tight">
              Add New User
            </h2>
            <p class="text-sm text-on-surface-variant mt-1">
              Configure access for a new team member.
            </p>
          </div>
          <button
            class="p-2 hover:bg-surface-container-low rounded-full transition-colors duration-300 text-on-surface-variant"
          >
            <i class="w-6 h-6" data-lucide="x"></i>
          </button>
        </div>
        <!-- Modal Form Body (Scrollable) -->
        <form class="px-8 pb-8 space-y-5 overflow-y-auto custom-scrollbar">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Username Field -->
            <div class="group">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
                >Username</label
              >
              <div
                class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
              >
                <i
                  class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                  data-lucide="user-cog"
                ></i>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                  name="user_name"
                  placeholder="apierce_admin"
                  type="text"
                />
              </div>
            </div>
            <!-- Email Field -->
            <div class="group">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
                >Email Address</label
              >
              <div
                class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
              >
                <i
                  class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                  data-lucide="mail"
                ></i>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                  name="email"
                  placeholder="alex@sim-curator.com"
                  type="email"
                />
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- First Name Field -->
            <div class="group">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
                >First Name</label
              >
              <div
                class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
              >
                <i
                  class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                  data-lucide="user"
                ></i>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                  name="first_name"
                  placeholder="Alexander"
                  type="text"
                />
              </div>
            </div>
            <!-- Last Name Field -->
            <div class="group">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
                >Last Name</label
              >
              <div
                class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
              >
                <i
                  class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                  data-lucide="user"
                ></i>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                  name="last_name"
                  placeholder="Pierce"
                  type="text"
                />
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Password Field -->
            <div class="group">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
                >Password
                <span class="text-[0.6rem] font-normal lowercase"
                  >(Optional)</span
                ></label
              >
              <div
                class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
              >
                <i
                  class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                  data-lucide="key-round"
                ></i>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                  name="password"
                  placeholder="••••••••"
                  type="password"
                />
              </div>
            </div>
            <!-- Date of Birth Field -->
            <div class="group">
              <label
                class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
                >Date of Birth</label
              >
              <div
                class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
              >
                <i
                  class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                  data-lucide="calendar"
                ></i>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                  name="date_of_birth"
                  type="date"
                />
              </div>
            </div>
          </div>
          <!-- Phone Field -->
          <div class="group">
            <label
              class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
              >Phone Number</label
            >
            <div
              class="relative flex items-center bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
            >
              <i
                class="w-4 h-4 absolute left-4 text-outline group-focus-within:text-primary transition-colors"
                data-lucide="phone"
              ></i>
              <input
                class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm"
                name="phone"
                placeholder="+1 (555) 000-0000"
                type="tel"
              />
            </div>
          </div>
          <!-- Address Field -->
          <div class="group">
            <label
              class="block text-[0.6875rem] font-bold uppercase tracking-wider text-outline mb-1.5 px-1"
              >Residential Address</label
            >
            <div
              class="relative flex items-start bg-surface-container-low rounded-xl focus-within:bg-primary/5 transition-colors border-b-2 border-outline-variant focus-within:border-primary"
            >
              <i
                class="w-4 h-4 absolute left-4 top-4 text-outline group-focus-within:text-primary transition-colors"
                data-lucide="map-pin"
              ></i>
              <textarea
                class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant font-medium text-sm resize-none"
                name="address"
                placeholder="123 Digital Way, Suite 400, Austin, TX"
                rows="2"
              ></textarea>
            </div>
          </div>
          <!-- Status & Role Toggle (Stacked for compact responsiveness) -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div
              class="flex items-center justify-between p-3.5 bg-surface-container-low rounded-xl"
            >
              <div class="flex items-center gap-3">
                <i class="w-5 h-5 text-primary" data-lucide="shield-check"></i>
                <div>
                  <div class="text-[0.8rem] font-bold text-on-surface">
                    Active Status
                  </div>
                </div>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input checked="" class="sr-only peer" type="checkbox" />
                <div
                  class="w-10 h-5 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:inset-s-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"
                ></div>
              </label>
            </div>
            <div
              class="relative flex items-center bg-surface-container-low rounded-xl border-b-2 border-outline-variant focus-within:border-primary px-3.5"
            >
              <i class="w-4 h-4 text-outline mr-3" data-lucide="briefcase"></i>
              <select
                class="w-full bg-transparent border-none focus:ring-0 py-3 text-on-surface font-medium text-sm appearance-none cursor-pointer"
              >
                <option value="support">Support Role</option>
                <option value="manager">Manager</option>
                <option value="admin">System Admin</option>
              </select>
              <i
                class="w-4 h-4 text-outline pointer-events-none ml-2"
                data-lucide="chevron-down"
              ></i>
            </div>
          </div>
          <!-- Action Buttons -->
          <div class="flex flex-col-reverse md:flex-row gap-3 pt-4 shrink-0">
            <button
              class="flex-1 px-6 py-3.5 rounded-xl text-on-surface font-bold text-sm border-2 border-outline-variant/30 hover:bg-surface-container-high transition-all duration-300"
              type="button"
            >
              Cancel
            </button>
            <button
              class="flex-[1.5] px-6 py-3.5 rounded-xl bg-linear-to-br from-primary to-primary-container text-on-primary font-bold text-sm shadow-xl shadow-primary/30 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2"
              type="submit"
            >
              <i class="w-4 h-4" data-lucide="user-plus"></i>
              Create Account
            </button>
          </div>
        </form>
        <!-- Visual Accent (Gradient Bar - Blue to Red theme) -->
        <div
          class="h-1.5 w-full bg-linear-to-r from-primary via-primary-container to-secondary shrink-0"
        ></div>
      </div>
    </div>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
  </body>
</html>
